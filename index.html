<!DOCTYPE html>
<html>
<head>
  <title>Geo Risk Intelligence</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    /* MAP */
    .map-container {
      position: relative;
      width: 1000px;
      margin: auto;
    }

    #map {
      width: 100%;
    }

    /* DOT */
    .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    /* PANEL */
    .panel {
      position: fixed;
      right: -350px;
      top: 0;
      width: 320px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.4s;
      overflow-y: auto;
    }

    .panel.active {
      right: 0;
    }

    button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* CHART */
    .chart-box {
      width: 100%;
      height: 250px;
    }

    /* DETAILS */
    #details {
      margin-top: 20px;
    }

    #details p {
      margin: 6px 0;
      font-size: 14px;
      color: #d1d5db;
    }
  </style>
</head>

<body>

<h1>Geo Risk Intelligence</h1>

<div class="map-container">
  <img id="map"
  src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">
</div>

<div id="panel" class="panel">
  <button onclick="closePanel()">✖</button>

  <h2 id="country"></h2>
  <h3 id="risk"></h3>

  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <div id="details"></div>
</div>

<script>
let chart;

const countries = {
  Russia: { lat:61.5, lon:105.3, values:[40,90,95,50,40,60] },
  India: { lat:20.6, lon:78.9, values:[38,45,20,50,35,40] },
  USA: { lat:37.1, lon:-95.7, values:[45,60,25,65,30,40] },
  China: { lat:35.8, lon:104.1, values:[30,65,50,50,40,50] },
  Pakistan: { lat:30.3, lon:69.3, values:[65,70,60,65,60,70] }
};

const labels = ["Political","Conflict","Sanctions","Unrest","Terrorism","Legal"];

window.addEventListener("load", () => {
  const map = document.getElementById("map");

  if(map.complete){
    createDots();
  } else {
    map.onload = createDots;
  }
});

function createDots(){
  const map = document.getElementById("map");
  const container = document.querySelector(".map-container");

  const width = map.clientWidth;
  const height = map.clientHeight;

  for(let name in countries){
    const c = countries[name];

    let x = (c.lon+180)*(width/360);
    let y = (90-c.lat)*(height/180);

    const dot = document.createElement("div");
    dot.className = "dot";

    dot.style.left = x+"px";
    dot.style.top = y+"px";

    dot.onclick = ()=>showCountry(name);

    container.appendChild(dot);
  }
}

function showCountry(name){
  const c = countries[name];
  const panel = document.getElementById("panel");

  panel.classList.add("active");

  const avg = Math.round(c.values.reduce((a,b)=>a+b)/6);

  document.getElementById("country").innerText = name;
  document.getElementById("risk").innerText =
    avg<34?"Low Risk":avg<67?"Medium Risk":"High Risk";

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"radar",
    data:{
      labels:labels,
      datasets:[{
        data:c.values,
        borderColor:"#00f0ff",
        backgroundColor:"rgba(0,240,255,0.2)"
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{ legend:{ display:false }},
      scales:{ r:{ ticks:{ display:false }}}
    }
  });

  let html = "<h4>Risk Breakdown</h4>";

  c.values.forEach((v,i)=>{
    html += `<p>${labels[i]}: <b>${v}</b></p>`;
  });

  document.getElementById("details").innerHTML = html;
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}
</script>

</body>
</html>
