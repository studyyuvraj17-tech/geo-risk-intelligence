<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Global Risk Research Institute | Live Analytical Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0f1c;
      --surface: #111827;
      --surface-light: #1f2937;
      --border: #374151;
      --accent: #0ea5e9;
      --accent-soft: rgba(14, 165, 233, 0.1);
      --low: #10b981;
      --medium: #f59e0b;
      --high: #ef4444;
      --text: #f9fafb;
      --muted: #9ca3af;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.2; pointer-events: none;
    }

    /* --- INSTITUTIONAL HEADER --- */
    header {
      z-index: 100; display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .logo-group { display: flex; align-items: center; gap: 18px; }
    .logo-circle {
      width: 44px; height: 44px; border: 1.5px solid var(--accent);
      display: grid; place-items: center; color: var(--accent);
      font-family: var(--mono); font-weight: 500; border-radius: 50%;
    }
    .logo-text h1 { font-size: 1.1rem; font-weight: 600; }
    .logo-text p { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* --- ANALYTICAL CONTROLS --- */
    .toolbar {
      padding: 12px 2.5rem;
      background: rgba(17, 24, 39, 0.8);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 25px;
    }
    .control-group { display: flex; align-items: center; gap: 12px; flex: 1; }
    input[type=range] { flex: 0.6; accent-color: var(--accent); cursor: pointer; height: 4px; }
    
    .btn-research {
      background: var(--surface-light); border: 1px solid var(--border);
      color: var(--text); font-family: var(--sans); padding: 5px 14px;
      cursor: pointer; border-radius: 5px; font-size: 0.75rem; transition: 0.2s;
    }
    .btn-research:hover { border-color: var(--accent); color: var(--accent); }

    /* --- LAYOUT --- */
    .main-container { flex: 1; display: flex; overflow: hidden; }
    .map-canvas { flex: 1; position: relative; background: #0c1220; display: flex; align-items: center; justify-content: center; }
    .map-box { position: relative; width: 90%; max-width: 1100px; }
    .map-box img { width: 100%; opacity: 0.25; filter: saturate(0) brightness(1.2); pointer-events: none; }

    /* --- GEOSPATIAL MARKERS --- */
    .marker {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      transform: translate(-50%, -50%); cursor: pointer; transition: 0.3s;
      border: 2px solid var(--bg); z-index: 10;
    }
    .marker:hover, .marker.highlight { transform: translate(-50%, -50%) scale(2.2); z-index: 50; }
    .m-low { background: var(--low); }
    .m-medium { background: var(--medium); }
    .m-high { background: var(--high); }

    /* --- SIDE PANEL --- */
    .side-bar { width: 420px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 25px; }
    .data-row { 
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: 0.2s;
    }
    .data-row:hover { background: var(--accent-soft); border-color: var(--accent); }

    /* --- STATUS FOOTER --- */
    .status-footer {
      height: 35px; background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 2.5rem; font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
    }
    .pulse-dot { width: 6px; height: 6px; background: var(--low); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 8px var(--low); }
    #tooltip { position: fixed; background: var(--surface-light); border: 1px solid var(--border); padding: 6px 12px; pointer-events: none; display: none; font-family: var(--mono); font-size: 0.7rem; border-radius: 4px; z-index: 2000; }
    
    /* Loading Overlay */
    #loading {
        position: fixed; inset: 0; background: var(--bg); z-index: 9999;
        display: flex; align-items: center; justify-content: center; font-family: var(--mono);
        color: var(--accent); font-size: 1rem;
    }
  </style>
</head>
<body>

<div id="loading">CONNECTING TO LIVE RESEARCH FEED...</div>

<header>
  <div class="logo-group">
    <div class="logo-circle">GR</div>
    <div class="logo-text">
      <h1>Global Risk Index</h1>
      <p id="live-indicator">LIVE FEED ACTIVE</p>
    </div>
  </div>
  <div style="font-family: var(--mono); font-size: 0.75rem;">
    SYNC TIME: <span id="sync-time" style="color: var(--accent);">--:--:--</span>
  </div>
</header>

<div class="toolbar">
  <div class="control-group">
    <label>Model Sensitivity:</label>
    <input type="range" id="multiplier" min="0.5" max="2.0" step="0.1" value="1.0">
    <span id="multVal" style="font-family:var(--mono); color:var(--accent); font-size:0.75rem">1.00x</span>
  </div>
  <button class="btn-research" onclick="refreshData()">Force Sync</button>
</div>

<div class="main-container">
  <main class="map-canvas">
    <div class="map-box" id="mapContainer">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">
    </div>
    <div id="tooltip"></div>
  </main>
  <aside class="side-bar" id="sidePanel"></aside>
</div>

<div class="status-footer">
  <div class="pulse-dot"></div>
  <div id="statusMessage">Continuous live sync active...</div>
</div>

<script>
let LIVE_DATA = {};
let multiplier = 1.0;
let radarChart = null;
const LABELS = ["Political Stability", "Conflict Risk", "Sanction Exposure", "Civil Unrest", "Internal Security", "Legal/Reg"];

// --- API CONNECTION CONFIGURATION ---
// To use a Google Sheet, publish it to web as CSV and use that URL here.
const API_URL = 'https://api.jsonbin.io/v3/b/65f8a0022662a738c48a7f45?meta=false'; 

async function refreshData() {
    document.getElementById('statusMessage').innerText = "Syncing with live database...";
    try {
        // In a real-world scenario, you would fetch from your API_URL
        // const response = await fetch(API_URL);
        // LIVE_DATA = await response.json();
        
        // For demonstration, we simulate a 1-second network delay to "static live" data
        await new Promise(resolve => setTimeout(resolve, 1000));
        LIVE_DATA = {
            "UA": { name: "Ukraine", lat: 48.3, lon: 31.1, base: 88, vals: [82, 95, 70, 75, 60, 65] },
            "RU": { name: "Russia", lat: 61.5, lon: 105.3, base: 78, vals: [60, 92, 98, 45, 40, 85] },
            "IN": { name: "India", lat: 20.5, lon: 78.9, base: 45, vals: [40, 35, 15, 50, 45, 45] },
            "CN": { name: "China", lat: 35.8, lon: 104.1, base: 58, vals: [35, 45, 65, 30, 20, 70] },
            "US": { name: "United States", lat: 37.0, lon: -95.7, base: 25, vals: [35, 10, 5, 55, 30, 20] },
            "IL": { name: "Israel", lat: 31.0, lon: 34.8, base: 82, vals: [60, 98, 30, 65, 90, 45] }
        };

        document.getElementById('sync-time').innerText = new Date().toLocaleTimeString();
        document.getElementById('loading').style.display = 'none';
        updateView();
    } catch (error) {
        document.getElementById('statusMessage').innerText = "Sync Error: Connection Timed Out";
        console.error("Fetch Error:", error);
    }
}

function getMercatorPos(lat, lon) {
  const x = (lon + 180) * (100 / 360);
  const latRad = lat * Math.PI / 180;
  const mercN = Math.log(Math.tan((Math.PI / 4) + (latRad / 2)));
  const y = 50 - (100 * mercN / (2 * Math.PI)); 
  return { x, y: y * 0.9 + 5 }; 
}

function updateView() {
  const container = document.getElementById('mapContainer');
  const panel = document.getElementById('sidePanel');
  
  document.querySelectorAll('.marker').forEach(m => m.remove());
  let html = `<div style="font-family:var(--mono); font-size:0.65rem; color:var(--accent); margin-bottom:15px;">Live Rankings</div>`;

  Object.entries(LIVE_DATA).forEach(([code, c]) => {
    const score = Math.min(100, Math.round(c.base * multiplier));
    const pos = getMercatorPos(c.lat, c.lon);
    
    const marker = document.createElement('div');
    marker.className = `marker ${score > 70 ? 'm-high' : (score > 40 ? 'm-medium' : 'm-low')}`;
    marker.id = `marker-${code}`;
    marker.style.left = `${pos.x}%`;
    marker.style.top = `${pos.y}%`;
    
    marker.onclick = () => showStudy(code, score);
    container.appendChild(marker);

    html += `
      <div class="data-row" onclick="showStudy('${code}', ${score})">
        <span style="font-size:0.85rem;">${c.name}</span>
        <span style="font-family:var(--mono); color:var(--accent)">${score}</span>
      </div>
    `;
  });
  panel.innerHTML = html;
}

function showStudy(code, score) {
  const c = LIVE_DATA[code];
  document.getElementById('sidePanel').innerHTML = `
    <button class="btn-research" style="width:100%; margin-bottom:20px" onclick="updateView()">← Back to Global</button>
    <h2 style="font-size:1.4rem;">${c.name}</h2>
    <div style="font-size:2.5rem; font-family:var(--mono); color:var(--accent); margin-bottom:20px;">${score}</div>
    <div style="height:240px; margin-bottom:30px"><canvas id="radarChart"></canvas></div>
    ${LABELS.map((label, i) => `
      <div style="margin-bottom:12px">
        <div style="display:flex; justify-content:space-between; font-size:0.65rem; font-family:var(--mono);">
          <span>${label}</span><span>${c.vals[i]}%</span>
        </div>
        <div style="height:4px; background:var(--surface-light); margin-top:4px;">
          <div style="height:100%; width:${c.vals[i]}%; background:var(--accent);"></div>
        </div>
      </div>
    `).join('')}
  `;

  const ctx = document.getElementById('radarChart').getContext('2d');
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ["POL", "CON", "SAN", "UNR", "SEC", "LEG"],
      datasets: [{ data: c.vals, borderColor: '#0ea5e9', backgroundColor: 'rgba(14, 165, 233, 0.2)', borderWidth: 1.5 }]
    },
    options: {
      scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' } } },
      plugins: { legend: { display: false } },
      responsive: true, maintainAspectRatio: false
    }
  });
}

document.getElementById('multiplier').addEventListener('input', (e) => {
    multiplier = e.target.value;
    document.getElementById('multVal').innerText = parseFloat(multiplier).toFixed(2) + 'x';
    updateView();
});

window.onload = refreshData;
</script>
</body>
</html>
