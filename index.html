<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo Risk Intelligence | Global Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #020408;
      --surface: #0a111f;
      --surface-light: #162235;
      --border: #1e3050;
      --accent: #00d4ff;
      --low: #22c55e;
      --medium: #f59e0b;
      --high: #ef4444;
      --text: #f8fafc;
      --muted: #94a3b8;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Exo 2', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* --- HEADER --- */
    header {
      z-index: 100; display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 2rem; background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .logo-group { display: flex; align-items: center; gap: 12px; }
    .logo-box { width: 35px; height: 35px; border: 2px solid var(--accent); display: grid; place-items: center; color: var(--accent); font-family: var(--mono); font-weight: bold; border-radius: 4px; }

    /* --- MAIN LAYOUT --- */
    .app-container { flex: 1; display: flex; position: relative; overflow: hidden; }
    
    .map-area { 
      flex: 1; 
      position: relative; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: #050a14; /* Deep blue fallback background */
      min-height: 500px; 
    }

    .map-container { 
      position: relative; 
      width: 95%; 
      max-width: 1000px;
      aspect-ratio: 2 / 1;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
    }
    
    /* Map Styling - Removed heavy filters to ensure visibility */
    .map-container img { 
        width: 100%; 
        height: 100%; 
        display: block; 
        opacity: 0.7; 
        pointer-events: none;
    }

    /* --- DOTS --- */
    .dot {
      position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer;
      border: 2px solid white; z-index: 20; transition: 0.2s;
    }
    .dot:hover { transform: translate(-50%, -50%) scale(1.8); box-shadow: 0 0 15px currentColor; }
    .dot-low { background: var(--low); color: var(--low); }
    .dot-medium { background: var(--medium); color: var(--medium); }
    .dot-high { background: var(--high); color: var(--high); }

    /* --- SIDE PANEL --- */
    .side-panel { width: 400px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .panel-content { padding: 1.5rem; }

    .score-hero { background: var(--surface-light); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
    .hero-val { font-size: 2.5rem; font-weight: bold; font-family: var(--mono); color: var(--accent); }

    .news-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-left: 4px solid var(--high); padding: 10px; margin-bottom: 10px; border-radius: 4px; }
    .news-time { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }

    #mapTooltip { position: absolute; background: var(--surface-light); border: 1px solid var(--accent); padding: 5px 10px; border-radius: 4px; pointer-events: none; font-family: var(--mono); font-size: 0.8rem; z-index: 1000; display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-box">GR</div>
    <div class="logo-text"><h1>Geo Risk Terminal</h1></div>
  </div>
</header>

<div class="app-container">
  <main class="map-area">
    <div class="map-container" id="mapContainer">
      <img src="https://simplemaps.com/static/svg/world.svg" id="worldMap" alt="World Map">
    </div>
    <div id="mapTooltip"></div>
  </main>

  <aside class="side-panel">
    <div class="panel-content" id="panelContent">
      </div>
  </aside>
</div>

<script>
const DIMENSIONS = ["Political", "Conflict", "Sanctions", "Unrest", "Terrorism", "Legal"];

const DATA = {
  "UA": { name: "Ukraine", lat: 48.4, lon: 31.2, vals: [85, 98, 70, 75, 60, 65] },
  "RU": { name: "Russia", lat: 61.5, lon: 105.3, vals: [50, 95, 98, 45, 40, 70] },
  "US": { name: "United States", lat: 37.1, lon: -95.7, vals: [40, 30, 10, 55, 35, 25] },
  "IN": { name: "India", lat: 20.6, lon: 78.9, vals: [35, 40, 15, 50, 45, 40] },
  "CN": { name: "China", lat: 35.8, lon: 104.1, vals: [30, 50, 60, 40, 30, 60] },
  "IL": { name: "Israel", lat: 31.0, lon: 34.8, vals: [70, 95, 20, 65, 90, 45] },
  "ZA": { name: "South Africa", lat: -30.5, lon: 22.9, vals: [60, 35, 15, 80, 20, 55] }
};

let radarChart = null;
const MAP_BOUNDS = { top: 85, bottom: -60, left: -180, right: 180 };

function latLonToPercent(lat, lon) {
  return {
    x: ((lon - MAP_BOUNDS.left) / (MAP_BOUNDS.right - MAP_BOUNDS.left)) * 100,
    y: ((MAP_BOUNDS.top - lat) / (MAP_BOUNDS.top - MAP_BOUNDS.bottom)) * 100
  };
}

function init() {
  renderDots();
  renderGlobal();
}

function renderDots() {
  const container = document.getElementById('mapContainer');
  Object.entries(DATA).forEach(([code, c]) => {
    const score = Math.round(c.vals.reduce((a,b)=>a+b,0)/6);
    const dot = document.createElement('div');
    dot.className = `dot ${score > 70 ? 'dot-high' : (score > 40 ? 'dot-medium' : 'dot-low')}`;
    const pos = latLonToPercent(c.lat, c.lon);
    dot.style.left = pos.x + '%';
    dot.style.top = pos.y + '%';
    dot.addEventListener('click', () => selectCountry(code));
    dot.addEventListener('mouseenter', (e) => showTip(e, c.name, score));
    dot.addEventListener('mouseleave', hideTip);
    container.appendChild(dot);
  });
}

function renderGlobal() {
  document.getElementById('panelContent').innerHTML = `
    <h2 style="margin-bottom:1rem">GLOBAL COMMAND</h2>
    <div class="score-hero">
        <p style="font-size:0.7rem; color:var(--muted)">AVG RISK INDEX</p>
        <p class="hero-val">62</p>
    </div>
    <div class="news-card">
        <p class="news-time">06:14 UTC</p>
        <p style="font-size:0.8rem">High tension reported in border zones. Monitoring sanctions impact.</p>
    </div>
  `;
}

function selectCountry(code) {
  const c = DATA[code];
  const score = Math.round(c.vals.reduce((a,b)=>a+b,0)/6);
  document.getElementById('panelContent').innerHTML = `
    <button onclick="renderGlobal()" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:1rem">← GLOBAL VIEW</button>
    <h2 style="margin-bottom:1rem">${c.name}</h2>
    <div class="score-hero">
        <p class="hero-val" style="color:${score > 70 ? 'var(--high)' : 'var(--low)'}">${score}</p>
    </div>
    <div style="height:250px"><canvas id="radarChart"></canvas></div>
  `;
  renderChart(c.vals);
}

function renderChart(vals) {
  const ctx = document.getElementById('radarChart').getContext('2d');
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DIMENSIONS,
      datasets: [{ data: vals, backgroundColor: 'rgba(0, 212, 255, 0.2)', borderColor: '#00d4ff' }]
    },
    options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
  });
}

function showTip(e, n, s) {
  const t = document.getElementById('mapTooltip');
  t.innerHTML = `${n}: ${s}`;
  t.style.display = 'block'; t.style.left = (e.pageX+15)+'px'; t.style.top = (e.pageY-15)+'px';
}
function hideTip() { document.getElementById('mapTooltip').style.display = 'none'; }

window.onload = init;
</script>
</body>
</html>
