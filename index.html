<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geo Risk Intelligence</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Geo Risk Intelligence</h1>
  <p>Advanced Geopolitical Risk Analytics Platform</p>
</section>

<!-- MAP -->
<section class="map-section">
  <h2>Global Risk Map</h2>

  <svg viewBox="0 0 800 400" class="world-map">
    <rect x="500" y="200" width="40" height="40" class="country" onclick="showCountry('India')" />
    <rect x="470" y="200" width="30" height="40" class="country" onclick="showCountry('Pakistan')" />
    <rect x="150" y="150" width="60" height="40" class="country" onclick="showCountry('USA')" />
    <rect x="550" y="180" width="50" height="40" class="country" onclick="showCountry('China')" />
    <rect x="500" y="100" width="100" height="50" class="country" onclick="showCountry('Russia')" />
  </svg>

</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">

  <h2 id="country-name"></h2>
  <p id="analysis"></p>

  <div class="score-box">
    <h3>Risk Score: <span id="score"></span></h3>
    <p id="risk-level"></p>
  </div>

  <canvas id="radarChart" width="300" height="300"></canvas>

  <div id="dimensions"></div>

</section>

<footer>
  <p>© 2026 Geo Risk Intelligence</p>
</footer>

</body>
</html>
