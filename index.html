<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo Risk Intelligence | Tactical Command</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #04080f;
      --surface: #0f172a;
      --surface-light: #16243d;
      --border: #1e3a8a;
      --accent: #38bdf8;
      --low: #22c55e;
      --medium: #f59e0b;
      --high: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Share Tech Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- SCANLINE & GRID --- */
    body::before {
      content: ""; position: fixed; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                  linear-gradient(90deg, rgba(56, 189, 248, 0.02) 1px, transparent 1px),
                  linear-gradient(rgba(56, 189, 248, 0.02) 1px, transparent 1px);
      background-size: 100% 4px, 40px 40px, 40px 40px;
      z-index: 1000; pointer-events: none;
    }

    header {
      z-index: 100; display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: #060b15; border-bottom: 2px solid var(--border);
    }
    .logo-group { display: flex; align-items: center; gap: 15px; }
    .logo-square {
      width: 45px; height: 45px; border: 2px solid var(--accent);
      display: grid; place-items: center; color: var(--accent);
      font-family: var(--mono); font-weight: bold; font-size: 1.2rem;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }

    /* --- TOOLBAR & SCENARIO SLIDER --- */
    .controls-bar {
      padding: 12px 2rem;
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 30px;
      z-index: 90;
    }
    .scenario-box { display: flex; align-items: center; gap: 15px; flex: 1; }
    input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
    
    .btn-era {
      background: var(--surface-light); border: 1px solid var(--accent);
      color: var(--accent); font-family: var(--mono); padding: 5px 15px;
      cursor: pointer; border-radius: 4px; font-size: 0.8rem;
    }
    .btn-era:hover { background: var(--accent); color: #000; }

    /* --- APP LAYOUT --- */
    .app-container { flex: 1; display: flex; overflow: hidden; position: relative; }
    
    .map-area { 
      flex: 1; position: relative; background: #070c18;
      display: flex; align-items: center; justify-content: center;
    }
    .map-wrapper { position: relative; width: 92%; max-width: 1200px; }
    .map-wrapper img { 
      width: 100%; opacity: 0.4;
      filter: invert(1) hue-rotate(180deg) brightness(0.5);
      pointer-events: none;
    }

    /* --- DOTS --- */
    .dot {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      transform: translate(-50%, -50%); cursor: pointer; transition: 0.4s;
      border: 1px solid rgba(255,255,255,0.3); z-index: 10;
    }
    .dot:hover { transform: translate(-50%, -50%) scale(3); z-index: 50; box-shadow: 0 0 20px currentColor; }
    .dot.active-target { transform: translate(-50%, -50%) scale(2.5); border: 2px solid #fff; box-shadow: 0 0 15px currentColor; }

    /* --- SIDE PANEL --- */
    .side-panel { 
      width: 400px; background: rgba(6, 11, 21, 0.98); 
      border-left: 1px solid var(--border); overflow-y: auto; padding: 20px;
    }
    .panel-header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
    
    .risk-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      padding: 12px; margin-bottom: 8px; border-radius: 4px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
    }
    .risk-card:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }

    /* --- NEWS TICKER --- */
    .news-ticker {
      position: fixed; bottom: 0; width: 100%; height: 30px;
      background: #000; border-top: 1px solid var(--border);
      color: var(--accent); font-family: var(--mono); font-size: 0.75rem;
      display: flex; align-items: center; z-index: 2000;
    }
    .ticker-label { background: var(--high); color: #000; padding: 0 15px; font-weight: bold; height: 100%; display: flex; align-items: center; }

    #tooltip { 
      position: fixed; background: var(--surface-light); border: 1px solid var(--accent);
      padding: 5px 10px; pointer-events: none; display: none; font-family: var(--mono); font-size: 0.7rem; z-index: 3000;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-square">GR</div>
    <div>
      <h1 style="letter-spacing:2px; font-size:1.1rem">GEO RISK INTELLIGENCE</h1>
      <p style="font-family:var(--mono); font-size:0.6rem; color:var(--muted)">OPERATIONAL THREAT SIMULATOR v4.0</p>
    </div>
  </div>
  <div style="display:flex; gap:20px; font-family:var(--mono); font-size:0.75rem">
    <div>SYSTEM STATUS: <span style="color:var(--low)">ONLINE</span></div>
    <div>ACTIVE THREATS: <span id="highCount" style="color:var(--high)">0</span></div>
  </div>
</header>

<div class="controls-bar">
  <div class="scenario-box">
    <span style="font-family:var(--mono); font-size:0.7rem; color:var(--accent)">GLOBAL CRISIS MULTIPLIER:</span>
    <input type="range" id="multiplier" min="0.5" max="2.0" step="0.1" value="1.0">
    <span id="multVal" style="font-family:var(--mono); color:var(--accent)">1.0x</span>
  </div>
  <button class="btn-era" id="eraBtn">ERA: CURRENT</button>
  <input type="text" id="search" placeholder="SEARCH REGION..." style="background:transparent; border:1px solid var(--border); color:white; padding:5px; font-family:var(--mono); font-size:0.8rem">
</div>

<div class="app-container">
  <main class="map-area">
    <div class="map-wrapper" id="mapContainer">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">
    </div>
    <div id="tooltip"></div>
  </main>

  <aside class="side-panel" id="sidePanel">
    </aside>
</div>

<div class="news-ticker">
  <div class="ticker-label">FLASH</div>
  <marquee id="newsText" scrollamount="5">INITIALIZING SATELLITE LINK... CONNECTION STABLE... SCANNING FOR GEOPOLITICAL ANOMALIES...</marquee>
</div>

<script>
// --- DATASETS (Time Travel) ---
const ERAS = ["CURRENT", "2024 (RECOVERY)", "2022 (ESCALATION)"];
let currentEraIndex = 0;

const BASE_DATA = {
  "UA": { name: "Ukraine", lat: 48, lon: 31, base: 85, current: 85 },
  "RU": { name: "Russia", lat: 60, lon: 100, base: 75, current: 75 },
  "US": { name: "United States", lat: 37, lon: -95, base: 25, current: 25 },
  "IN": { name: "India", lat: 20, lon: 78, base: 40, current: 40 },
  "CN": { name: "China", lat: 35, lon: 104, base: 50, current: 50 },
  "IL": { name: "Israel", lat: 31, lon: 34, base: 70, current: 70 },
  "IR": { name: "Iran", lat: 32, lon: 53, base: 65, current: 65 },
  "NG": { name: "Nigeria", lat: 9, lon: 8, base: 60, current: 60 },
  "BR": { name: "Brazil", lat: -14, lon: -51, base: 35, current: 35 },
  "KP": { name: "North Korea", lat: 40, lon: 127, base: 80, current: 80 },
  "GB": { name: "United Kingdom", lat: 55, lon: -3, base: 20, current: 20 },
  "TW": { name: "Taiwan", lat: 23, lon: 121, base: 55, current: 55 }
};

const NEWS_FLASHES = [
  "Maritime corridor blockade reported in Red Sea.",
  "New sanctions package approved by G7 assembly.",
  "Cyber-infrastructure alert issued for European power grids.",
  "Unusual troop movements detected near northern border.",
  "Global semiconductor supply chain faces 15% volatility increase."
];

let globalMult = 1.0;
let radarChart = null;

// --- CORE LOGIC ---
function init() {
  updateWorld();
  setInterval(cycleNews, 8000);

  document.getElementById('multiplier').addEventListener('input', (e) => {
    globalMult = e.target.value;
    document.getElementById('multVal').innerText = globalMult + 'x';
    updateWorld();
  });

  document.getElementById('eraBtn').addEventListener('click', () => {
    currentEraIndex = (currentEraIndex + 1) % ERAS.length;
    document.getElementById('eraBtn').innerText = "ERA: " + ERAS[currentEraIndex];
    // Randomize data slightly to simulate historical shifts
    Object.keys(BASE_DATA).forEach(k => {
      BASE_DATA[k].base = Math.min(95, Math.max(10, BASE_DATA[k].base + (Math.random() * 20 - 10)));
    });
    updateWorld();
  });

  document.getElementById('search').addEventListener('input', updateWorld);
}

function updateWorld() {
  const searchTerm = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('mapContainer');
  const panel = document.getElementById('sidePanel');
  
  // Clear map dots
  document.querySelectorAll('.dot').forEach(d => d.remove());
  
  let html = `<div class="panel-header"><h2 style="font-size:1rem; color:var(--accent)">COMMAND WATCHLIST</h2></div>`;
  let highCount = 0;

  Object.entries(BASE_DATA).forEach(([code, c]) => {
    const adjustedScore = Math.min(100, Math.round(c.base * globalMult));
    const riskColor = adjustedScore > 70 ? 'var(--high)' : (adjustedScore > 40 ? 'var(--medium)' : 'var(--low)');
    if (adjustedScore > 70) highCount++;

    if (!c.name.toLowerCase().includes(searchTerm)) return;

    // Create Dot
    const pos = getMapPos(c.lat, c.lon);
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.id = `dot-${code}`;
    dot.style.left = `${pos.x}%`;
    dot.style.top = `${pos.y}%`;
    dot.style.backgroundColor = riskColor;
    dot.style.color = riskColor;
    
    dot.onclick = () => showDetails(code, adjustedScore);
    dot.onmouseenter = (e) => showTooltip(e, c.name, adjustedScore);
    dot.onmouseleave = hideTooltip;
    container.appendChild(dot);

    // Sidebar Entry
    html += `
      <div class="risk-card" onclick="showDetails('${code}', ${adjustedScore})" 
           onmouseenter="highlightDot('${code}', true)" onmouseleave="highlightDot('${code}', false)">
        <div>
          <div style="font-size:0.85rem; font-weight:bold">${c.name.toUpperCase()}</div>
          <div style="font-family:var(--mono); font-size:0.6rem; color:var(--muted)">LAT: ${c.lat} LON: ${c.lon}</div>
        </div>
        <div style="color:${riskColor}; font-family:var(--mono); font-weight:bold; font-size:1.1rem">${adjustedScore}</div>
      </div>
    `;
  });

  panel.innerHTML = html;
  document.getElementById('highCount').innerText = highCount;
}

function showDetails(code, score) {
  const c = BASE_DATA[code];
  const riskColor = score > 70 ? 'var(--high)' : (score > 40 ? 'var(--medium)' : 'var(--low)');
  
  // Create unique detail view
  document.getElementById('sidePanel').innerHTML = `
    <button class="btn-era" style="margin-bottom:20px; width:100%" onclick="updateWorld()">← BACK TO LIST</button>
    <div style="text-align:center; margin-bottom:20px">
      <h2 style="letter-spacing:2px">${c.name.toUpperCase()}</h2>
      <div style="font-size:3rem; font-family:var(--mono); color:${riskColor}">${score}</div>
      <div style="font-size:0.7rem; color:var(--muted)">COMPOSITE RISK INDEX</div>
    </div>
    <div style="height:250px; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px">
      <canvas id="radarChart"></canvas>
    </div>
    <p style="margin-top:20px; font-size:0.75rem; color:var(--muted); line-height:1.4; font-style:italic">
      Automated intelligence report for ${c.name}. Vulnerability detected in cross-border logistics and political stability sectors. Multiplier impact: ${globalMult}x.
    </p>
  `;

  renderRadar(score);
}

function renderRadar(score) {
  const ctx = document.getElementById('radarChart').getContext('2d');
  const vals = [score, score-10, score+5, score-5, score+10, score-15]; // Variations of the score
  
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ["POL", "CON", "SAN", "UNR", "TER", "LEG"],
      datasets: [{
        data: vals,
        borderColor: '#38bdf8',
        backgroundColor: 'rgba(56, 189, 248, 0.2)',
        pointRadius: 2
      }]
    },
    options: {
      scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#1e3a8a' }, pointLabels: { color: '#64748b', font: { family: 'Share Tech Mono' } } } },
      plugins: { legend: { display: false } },
      responsive: true, maintainAspectRatio: false
    }
  });
}

function getMapPos(lat, lon) {
  return { x: ((lon + 180) * (100 / 360)), y: ((90 - lat) * (100 / 180)) };
}

function highlightDot(code, active) {
  const dot = document.getElementById(`dot-${code}`);
  if (dot) {
    if (active) dot.classList.add('active-target');
    else dot.classList.remove('active-target');
  }
}

function cycleNews() {
  const text = NEWS_FLASHES[Math.floor(Math.random() * NEWS_FLASHES.length)];
  document.getElementById('newsText').innerText = `[REPORT] ${text.toUpperCase()} ... [SYSTEM] MONITORING CONTINUES ... [TIME] ${new Date().toLocaleTimeString()} ...`;
}

function showTooltip(e, name, score) {
  const t = document.getElementById('tooltip');
  t.style.display = 'block';
  t.style.left = e.clientX + 15 + 'px';
  t.style.top = e.clientY + 15 + 'px';
  t.innerHTML = `<span style="color:var(--accent)">TARGET: ${name.toUpperCase()}</span><br>RISK: ${score}`;
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

window.onload = init;
</script>
</body>
</html>
