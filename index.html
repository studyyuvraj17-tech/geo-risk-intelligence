<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo Risk Intelligence | Professional Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #060b15;
      --surface: #0f172a;
      --surface-light: #16243d;
      --border: #283d63;
      --accent: #38bdf8;
      --low: #22c55e;
      --medium: #f59e0b;
      --high: #ef4444;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Exo 2', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* CRT Scanline Effect */
    body::after {
      content: " ";
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      z-index: 999;
      background-size: 100% 4px, 4px 100%;
      pointer-events: none;
    }

    /* --- HEADER --- */
    header {
      z-index: 100; display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 2rem;
      background: rgba(6, 11, 21, 0.95);
      border-bottom: 1px solid var(--border);
    }
    .logo-group { display: flex; align-items: center; gap: 15px; }
    .logo-square {
      width: 40px; height: 40px; border: 2px solid var(--accent);
      display: grid; place-items: center; color: var(--accent);
      font-family: var(--mono); font-weight: bold; border-radius: 4px;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }
    .logo-text h1 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
    .logo-text p { font-size: 0.6rem; color: var(--muted); font-family: var(--mono); }

    .header-stats { display: flex; gap: 1rem; }
    .stat-box {
      background: var(--surface-light);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.7rem;
    }

    /* --- TOOLBAR --- */
    .toolbar {
      padding: 10px 2rem;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    #searchInput {
      background: var(--surface-light);
      border: 1px solid var(--border);
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-family: var(--mono);
      outline: none;
      width: 220px;
      font-size: 0.8rem;
    }
    #searchInput:focus { border-color: var(--accent); }
    .filter-pills { display: flex; gap: 6px; }
    .pill {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 0.65rem;
      cursor: pointer;
      font-family: var(--mono);
      transition: 0.2s;
    }
    .pill.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* --- MAIN LAYOUT --- */
    .app-container { flex: 1; display: flex; overflow: hidden; }
    
    .map-area { 
      flex: 1; 
      position: relative; 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: radial-gradient(circle at center, #0f172a 0%, #060b15 100%);
    }

    .map-container {
      position: relative;
      width: 95%;
      max-width: 1200px;
    }
    .map-container img { 
      width: 100%; 
      filter: brightness(0.3) invert(1) sepia(1) saturate(10) hue-rotate(180deg); 
      opacity: 0.5;
      pointer-events: none;
    }

    /* Scanning line animation */
    .scan-line {
      position: absolute;
      width: 100%;
      height: 1px;
      background: rgba(56, 189, 248, 0.4);
      top: 0;
      animation: scan 10s linear infinite;
      z-index: 5;
      box-shadow: 0 0 8px var(--accent);
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* --- DOTS --- */
    .dot {
      position: absolute; width: 8px; height: 8px; border-radius: 50%; 
      transform: translate(-50%, -50%); cursor: pointer;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .dot:hover, .dot.highlight { transform: translate(-50%, -50%) scale(3); z-index: 20; box-shadow: 0 0 15px currentColor; border-color: #fff; }
    .dot-low { background: var(--low); color: var(--low); }
    .dot-medium { background: var(--medium); color: var(--medium); }
    .dot-high { background: var(--high); color: var(--high); }

    /* --- SIDE PANEL --- */
    .side-panel { 
      width: 380px; 
      background: rgba(15, 23, 42, 0.98); 
      border-left: 1px solid var(--border); 
      overflow-y: auto;
      padding: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .section-title { 
      font-family: var(--mono); 
      font-size: 0.65rem; 
      color: var(--accent); 
      margin: 1.2rem 0 8px 0; 
      text-transform: uppercase; 
      letter-spacing: 1.5px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .watch-item { 
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; background: rgba(255,255,255,0.02); 
      border: 1px solid var(--border); margin-bottom: 6px;
      cursor: pointer; border-radius: 4px; transition: 0.2s;
    }
    .watch-item:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.08); transform: translateX(3px); }

    .risk-bar-container { margin-bottom: 12px; }
    .risk-bar-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-family: var(--mono); margin-bottom: 4px; color: var(--muted); }
    .risk-bar-bg { height: 4px; background: #000; border-radius: 2px; overflow: hidden;}
    .risk-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease-out; }

    .back-btn { 
      color: var(--accent); background: transparent; border: 1px solid var(--accent); 
      padding: 4px 10px; font-family: var(--mono); cursor: pointer; margin-bottom: 15px;
      font-size: 0.7rem; border-radius: 3px;
    }
    .back-btn:hover { background: var(--accent); color: #000; }

    #mapTooltip { 
      position: fixed; background: var(--surface-light); border: 1px solid var(--accent); 
      padding: 4px 8px; pointer-events: none; display: none; font-family: var(--mono); font-size: 0.65rem; z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-square">GR</div>
    <div class="logo-text">
      <h1>Geo Risk Intelligence</h1>
      <p>STRATEGIC THREAT TERMINAL</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-box">ASSETS: <span id="statTotal">0</span></div>
    <div class="stat-box">CRITICAL: <span id="statHigh" style="color:var(--high)">0</span></div>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="SEARCH REGION...">
  <div class="filter-pills">
    <button class="pill active" data-filter="all">ALL</button>
    <button class="pill" data-filter="high">HIGH</button>
    <button class="pill" data-filter="medium">MID</button>
    <button class="pill" data-filter="low">STABLE</button>
  </div>
</div>

<div class="app-container">
  <main class="map-area">
    <div class="map-container" id="mapContainer">
      <div class="scan-line"></div>
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">
    </div>
    <div id="mapTooltip"></div>
  </main>

  <aside class="side-panel" id="sidePanel">
    </aside>
</div>

<script>
// --- EXTENDED DATASET ---
const DATA = {
  "UA": { name: "Ukraine", lat: 48, lon: 31, vals: [88, 98, 75, 80, 60, 65] },
  "SY": { name: "Syria", lat: 34, lon: 38, vals: [92, 95, 85, 80, 90, 88] },
  "AF": { name: "Afghanistan", lat: 33, lon: 67, vals: [90, 70, 85, 60, 95, 90] },
  "US": { name: "United States", lat: 37, lon: -95, vals: [35, 10, 5, 55, 30, 20] },
  "IN": { name: "India", lat: 20, lon: 78, vals: [40, 35, 15, 50, 45, 45] },
  "CN": { name: "China", lat: 35, lon: 104, vals: [35, 45, 65, 30, 20, 70] },
  "RU": { name: "Russia", lat: 60, lon: 100, vals: [60, 90, 98, 40, 35, 85] },
  "BR": { name: "Brazil", lat: -14, lon: -51, vals: [50, 25, 10, 65, 15, 55] },
  "GB": { name: "United Kingdom", lat: 55, lon: -3, vals: [25, 10, 5, 45, 30, 15] },
  "AU": { name: "Australia", lat: -25, lon: 133, vals: [15, 5, 5, 15, 10, 10] },
  "ZA": { name: "South Africa", lat: -30, lon: 22, vals: [65, 30, 10, 85, 25, 60] },
  "EG": { name: "Egypt", lat: 26, lon: 30, vals: [70, 40, 20, 50, 65, 75] },
  "MX": { name: "Mexico", lat: 23, lon: -102, vals: [55, 70, 15, 45, 80, 65] },
  "FR": { name: "France", lat: 46, lon: 2, vals: [30, 15, 5, 60, 40, 20] },
  "DE": { name: "Germany", lat: 51, lon: 10, vals: [20, 5, 5, 35, 20, 10] },
  "JP": { name: "Japan", lat: 36, lon: 138, vals: [15, 10, 5, 10, 5, 15] },
  "CA": { name: "Canada", lat: 56, lon: -106, vals: [20, 5, 5, 25, 10, 10] },
  "NG": { name: "Nigeria", lat: 9, lon: 8, vals: [75, 80, 20, 70, 90, 80] },
  "IL": { name: "Israel", lat: 31, lon: 34, vals: [55, 95, 25, 60, 85, 40] },
  "IR": { name: "Iran", lat: 32, lon: 53, vals: [80, 65, 95, 70, 50, 90] },
  "KP": { name: "North Korea", lat: 40, lon: 127, vals: [95, 85, 99, 10, 15, 98] },
  "VN": { name: "Vietnam", lat: 14, lon: 108, vals: [30, 20, 10, 15, 10, 40] },
  "PK": { name: "Pakistan", lat: 30, lon: 69, vals: [85, 75, 40, 70, 90, 85] }
};

const DIMENSIONS = ["Political", "Conflict", "Sanctions", "Unrest", "Terrorism", "Legal"];
let radarChart = null;

function getPos(lat, lon) {
  const x = ((lon + 180) * (100 / 360));
  const y = ((90 - lat) * (100 / 180));
  return { x, y };
}

function getAvg(vals) {
  return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
}

function getRisk(score) {
  if (score > 70) return { label: 'CRITICAL', color: 'var(--high)', class: 'dot-high' };
  if (score > 40) return { label: 'ELEVATED', color: 'var(--medium)', class: 'dot-medium' };
  return { label: 'STABLE', color: 'var(--low)', class: 'dot-low' };
}

function init() {
  renderMap();
  renderGlobal();
  updateStats();

  document.getElementById('searchInput').addEventListener('input', filterData);
  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', (e) => {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterData();
    });
  });
}

function updateStats() {
  const countries = Object.values(DATA);
  document.getElementById('statTotal').innerText = countries.length;
  document.getElementById('statHigh').innerText = countries.filter(c => getAvg(c.vals) > 70).length;
}

function renderMap() {
  const container = document.getElementById('mapContainer');
  Object.entries(DATA).forEach(([code, c]) => {
    const score = getAvg(c.vals);
    const risk = getRisk(score);
    const pos = getPos(c.lat, c.lon);
    
    const dot = document.createElement('div');
    dot.className = `dot ${risk.class}`;
    dot.id = `dot-${code}`;
    dot.style.left = `${pos.x}%`;
    dot.style.top = `${pos.y}%`;
    
    dot.addEventListener('click', () => showDetails(code));
    dot.addEventListener('mouseenter', (e) => {
      const t = document.getElementById('mapTooltip');
      t.style.display = 'block';
      t.style.left = e.clientX + 12 + 'px';
      t.style.top = e.clientY + 12 + 'px';
      t.innerHTML = `<span style="color:var(--accent)">${c.name.toUpperCase()}</span><br>INDEX: ${score}`;
    });
    dot.addEventListener('mousemove', (e) => {
      const t = document.getElementById('mapTooltip');
      t.style.left = e.clientX + 12 + 'px';
      t.style.top = e.clientY + 12 + 'px';
    });
    dot.addEventListener('mouseleave', () => {
      document.getElementById('mapTooltip').style.display = 'none';
    });
    
    container.appendChild(dot);
  });
}

function filterData() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.querySelector('.pill.active').dataset.filter;

  Object.entries(DATA).forEach(([code, c]) => {
    const score = getAvg(c.vals);
    const riskLvl = score > 70 ? 'high' : (score > 40 ? 'medium' : 'low');
    const matchSearch = c.name.toLowerCase().includes(query);
    const matchFilter = filter === 'all' || filter === riskLvl;
    
    const display = (matchSearch && matchFilter) ? 'block' : 'none';
    document.getElementById(`dot-${code}`).style.display = display;
  });
  renderGlobal(); // Refresh list to match filters
}

function renderGlobal() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.querySelector('.pill.active').dataset.filter;
  
  const sorted = Object.entries(DATA)
    .filter(([code, c]) => {
       const score = getAvg(c.vals);
       const riskLvl = score > 70 ? 'high' : (score > 40 ? 'medium' : 'low');
       return c.name.toLowerCase().includes(query) && (filter === 'all' || filter === riskLvl);
    })
    .sort((a,b) => getAvg(b[1].vals) - getAvg(a[1].vals));
  
  let html = `
    <h2 style="margin-bottom:15px; font-size:1.2rem">COMMAND CONSOLE</h2>
    <div class="section-title">Global Risk Watchlist</div>
  `;
  
  sorted.forEach(([code, c]) => {
    const score = getAvg(c.vals);
    const risk = getRisk(score);
    html += `
      <div class="watch-item" onclick="showDetails('${code}')" 
           onmouseenter="document.getElementById('dot-${code}').classList.add('highlight')"
           onmouseleave="document.getElementById('dot-${code}').classList.remove('highlight')">
        <div style="display:flex; flex-direction:column">
           <span style="font-size:0.85rem; font-weight:600">${c.name}</span>
           <span style="font-size:0.6rem; color:var(--muted); font-family:var(--mono)">${risk.label}</span>
        </div>
        <span style="color:${risk.color}; font-family:var(--mono); font-weight:bold; font-size:1rem">${score}</span>
      </div>
    `;
  });
  
  document.getElementById('sidePanel').innerHTML = html;
}

function showDetails(code) {
  const c = DATA[code];
  const score = getAvg(c.vals);
  const risk = getRisk(score);
  
  let html = `
    <button class="back-btn" onclick="renderGlobal()">← RETURN TO GLOBAL</button>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px">
       <h2 style="text-transform:uppercase; font-size:1.4rem">${c.name}</h2>
    </div>
    <p style="color:${risk.color}; font-family:var(--mono); font-size:0.75rem; margin-bottom:20px; letter-spacing:1px">${risk.label} OPERATIONAL RISK</p>
    
    <div style="height:220px; margin-bottom:25px; background:rgba(0,0,0,0.2); border-radius:8px; padding:10px">
      <canvas id="radarChart"></canvas>
    </div>
    
    <div class="section-title">Vulnerability Matrix</div>
  `;
  
  DIMENSIONS.forEach((dim, i) => {
    const val = c.vals[i];
    html += `
      <div class="risk-bar-container">
        <div class="risk-bar-label"><span>${dim.toUpperCase()}</span><span>${val}</span></div>
        <div class="risk-bar-bg">
          <div class="risk-bar-fill" style="width:${val}%; background:${getRisk(val).color}"></div>
        </div>
      </div>
    `;
  });
  
  document.getElementById('sidePanel').innerHTML = html;
  
  const ctx = document.getElementById('radarChart').getContext('2d');
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DIMENSIONS,
      datasets: [{
        data: c.vals,
        borderColor: '#38bdf8',
        backgroundColor: 'rgba(56, 189, 248, 0.15)',
        borderWidth: 2,
        pointBackgroundColor: '#38bdf8',
        pointRadius: 2
      }]
    },
    options: {
      scales: { 
        r: { 
          min: 0, max: 100, 
          ticks: { display: false, stepSize: 25 }, 
          grid: { color: 'rgba(40, 61, 99, 0.5)' }, 
          angleLines: { color: 'rgba(40, 61, 99, 0.5)' },
          pointLabels: { color: '#94a3b8', font: { family: 'Share Tech Mono', size: 10 } } 
        } 
      },
      plugins: { legend: { display: false } },
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

window.onload = init;
</script>
</body>
</html>
