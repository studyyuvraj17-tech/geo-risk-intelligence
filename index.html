<!DOCTYPE html>
<html>
<head>
  <title>Geo Risk Intelligence</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<div class="header">
  <h1>Geo Risk Intelligence</h1>
  <p>Global Geopolitical Risk Platform</p>
</div>

<p class="instruction">Click on a country to view intelligence analysis</p>

<div class="map-container">
  <img id="map"
  src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">
</div>

<div class="legend">
  <span class="low-box"></span> Low
  <span class="medium-box"></span> Medium
  <span class="high-box"></span> High
</div>

<div id="panel" class="panel">
  <button class="close-btn" onclick="closePanel()">✖</button>

  <h2 id="country"></h2>
  <h3 id="risk"></h3>

  <canvas id="chart"></canvas>

  <h4>Analysis</h4>
  <p id="analysis"></p>

  <h4>Risk Breakdown</h4>
  <div id="details"></div>
</div>

</body>
</html>
