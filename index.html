<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo Risk Intelligence | Professional Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #060b15;
      --surface: #0f172a;
      --surface-light: #16243d;
      --border: #283d63;
      --accent: #38bdf8;
      --low: #22c55e;
      --medium: #f59e0b;
      --high: #ef4444;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Exo 2', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Scanline Effect */
    body::after {
      content: " ";
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      z-index: 999;
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
    }

    /* --- HEADER --- */
    header {
      z-index: 100; display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(6, 11, 21, 0.95);
      border-bottom: 1px solid var(--border);
    }
    .logo-group { display: flex; align-items: center; gap: 15px; }
    .logo-square {
      width: 42px; height: 42px; border: 2px solid var(--accent);
      display: grid; place-items: center; color: var(--accent);
      font-family: var(--mono); font-weight: bold; border-radius: 4px;
    }
    .logo-text h1 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; }
    .logo-text p { font-size: 0.65rem; color: var(--muted); font-family: var(--mono); }

    .header-stats { display: flex; gap: 1rem; }
    .stat-box {
      background: var(--surface-light);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.75rem;
    }

    /* --- TOOLBAR --- */
    .toolbar {
      padding: 12px 2rem;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
    }
    #searchInput {
      background: var(--surface-light);
      border: 1px solid var(--border);
      color: white;
      padding: 8px 15px;
      border-radius: 4px;
      font-family: var(--mono);
      outline: none;
      width: 250px;
    }
    .filter-pills { display: flex; gap: 8px; }
    .pill {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: var(--mono);
    }
    .pill.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* --- MAIN LAYOUT --- */
    .app-container { flex: 1; display: flex; overflow: hidden; }
    
    .map-area { 
      flex: 1; 
      position: relative; 
      overflow: auto; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: radial-gradient(circle at center, #16243d 0%, #060b15 100%);
    }

    .map-container {
      position: relative;
      width: 90%;
      max-width: 1100px;
    }
    .map-container img { 
      width: 100%; 
      filter: brightness(0.4) invert(1) sepia(1) saturate(5) hue-rotate(175deg); 
      opacity: 0.6;
    }

    /* Scanning line */
    .scan-line {
      position: absolute;
      width: 100%;
      height: 2px;
      background: rgba(56, 189, 248, 0.3);
      top: 0;
      animation: scan 8s linear infinite;
      z-index: 5;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* --- DOTS --- */
    .dot {
      position: absolute; width: 10px; height: 10px; border-radius: 50%; 
      transform: translate(-50%, -50%); cursor: pointer;
      transition: 0.3s; z-index: 10;
    }
    .dot:hover, .dot.highlight { transform: translate(-50%, -50%) scale(2.5); z-index: 20; box-shadow: 0 0 15px currentColor; }
    .dot-low { background: var(--low); color: var(--low); }
    .dot-medium { background: var(--medium); color: var(--medium); }
    .dot-high { background: var(--high); color: var(--high); }

    /* --- SIDE PANEL --- */
    .side-panel { 
      width: 400px; 
      background: rgba(15, 23, 42, 0.98); 
      border-left: 1px solid var(--border); 
      overflow-y: auto;
      padding: 1.5rem;
    }

    .section-title { 
      font-family: var(--mono); 
      font-size: 0.7rem; 
      color: var(--accent); 
      margin: 1.5rem 0 10px 0; 
      text-transform: uppercase; 
      letter-spacing: 2px;
    }

    .watch-item { 
      display: flex; justify-content: space-between; 
      padding: 10px; background: rgba(255,255,255,0.03); 
      border: 1px solid var(--border); margin-bottom: 8px;
      cursor: pointer; border-radius: 4px;
    }
    .watch-item:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }

    .risk-bar-container { margin-bottom: 15px; }
    .risk-bar-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-family: var(--mono); margin-bottom: 4px; }
    .risk-bar-bg { height: 4px; background: #000; border-radius: 2px; }
    .risk-bar-fill { height: 100%; border-radius: 2px; transition: width 1s; }

    .back-btn { 
      color: var(--accent); background: none; border: 1px solid var(--accent); 
      padding: 5px 10px; font-family: var(--mono); cursor: pointer; margin-bottom: 20px;
    }

    #mapTooltip { 
      position: fixed; background: var(--surface-light); border: 1px solid var(--accent); 
      padding: 5px 10px; pointer-events: none; display: none; font-family: var(--mono); font-size: 0.7rem; z-index: 1000;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-square">GR</div>
    <div class="logo-text">
      <h1>Geo Risk Intelligence</h1>
      <p>STRATEGIC THREAT TERMINAL</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-box">MONITORED: <span id="statTotal">0</span></div>
    <div class="stat-box">CRITICAL: <span id="statHigh" style="color:var(--high)">0</span></div>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="SEARCH SYSTEM...">
  <div class="filter-pills">
    <button class="pill active" data-filter="all">ALL</button>
    <button class="pill" data-filter="high">HIGH</button>
    <button class="pill" data-filter="medium">MID</button>
    <button class="pill" data-filter="low">STABLE</button>
  </div>
</div>

<div class="app-container">
  <main class="map-area">
    <div class="map-container" id="mapContainer">
      <div class="scan-line"></div>
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">
    </div>
    <div id="mapTooltip"></div>
  </main>

  <aside class="side-panel" id="sidePanel">
    </aside>
</div>

<script>
const DATA = {
  "UA": { name: "Ukraine", lat: 48, lon: 31, vals: [85, 98, 70, 75, 60, 65] },
  "SY": { name: "Syria", lat: 34, lon: 38, vals: [92, 90, 85, 80, 85, 88] },
  "US": { name: "United States", lat: 37, lon: -95, vals: [40, 30, 10, 55, 35, 25] },
  "IN": { name: "India", lat: 20, lon: 78, vals: [35, 40, 15, 50, 45, 40] },
  "CN": { name: "China", lat: 35, lon: 104, vals: [30, 50, 60, 40, 30, 60] },
  "RU": { name: "Russia", lat: 60, lon: 100, vals: [50, 95, 98, 45, 40, 70] },
  "BR": { name: "Brazil", lat: -14, lon: -51, vals: [45, 30, 10, 60, 15, 40] },
  "GB": { name: "United Kingdom", lat: 55, lon: -3, vals: [20, 10, 5, 40, 25, 15] }
};

const DIMENSIONS = ["Political", "Conflict", "Sanctions", "Unrest", "Terrorism", "Legal"];
let radarChart = null;

// Convert Lat/Lon to % for the SVG map
function getPos(lat, lon) {
  const x = ((lon + 180) * (100 / 360));
  const y = ((90 - lat) * (100 / 180));
  return { x, y };
}

function getAvg(vals) {
  return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
}

function getRisk(score) {
  if (score > 70) return { label: 'HIGH', color: 'var(--high)', class: 'dot-high' };
  if (score > 40) return { label: 'MID', color: 'var(--medium)', class: 'dot-medium' };
  return { label: 'LOW', color: 'var(--low)', class: 'dot-low' };
}

function init() {
  renderMap();
  renderGlobal();
  updateStats();

  document.getElementById('searchInput').addEventListener('input', filterData);
  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', (e) => {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterData();
    });
  });
}

function updateStats() {
  const countries = Object.values(DATA);
  document.getElementById('statTotal').innerText = countries.length;
  document.getElementById('statHigh').innerText = countries.filter(c => getAvg(c.vals) > 70).length;
}

function renderMap() {
  const container = document.getElementById('mapContainer');
  Object.entries(DATA).forEach(([code, c]) => {
    const score = getAvg(c.vals);
    const risk = getRisk(score);
    const pos = getPos(c.lat, c.lon);
    
    const dot = document.createElement('div');
    dot.className = `dot ${risk.class}`;
    dot.id = `dot-${code}`;
    dot.style.left = `${pos.x}%`;
    dot.style.top = `${pos.y}%`;
    
    dot.addEventListener('click', () => showDetails(code));
    dot.addEventListener('mouseenter', (e) => {
      const t = document.getElementById('mapTooltip');
      t.style.display = 'block';
      t.style.left = e.clientX + 10 + 'px';
      t.style.top = e.clientY + 10 + 'px';
      t.innerText = `${c.name}: ${score}`;
    });
    dot.addEventListener('mouseleave', () => {
      document.getElementById('mapTooltip').style.display = 'none';
    });
    
    container.appendChild(dot);
  });
}

function filterData() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.querySelector('.pill.active').dataset.filter;

  Object.entries(DATA).forEach(([code, c]) => {
    const score = getAvg(c.vals);
    const risk = score > 70 ? 'high' : (score > 40 ? 'medium' : 'low');
    const matchSearch = c.name.toLowerCase().includes(query);
    const matchFilter = filter === 'all' || filter === risk;
    
    document.getElementById(`dot-${code}`).style.display = (matchSearch && matchFilter) ? 'block' : 'none';
  });
}

function renderGlobal() {
  const sorted = Object.entries(DATA).sort((a,b) => getAvg(b[1].vals) - getAvg(a[1].vals));
  
  let html = `
    <h2 style="margin-bottom:20px">GLOBAL OVERVIEW</h2>
    <div class="section-title">Critical Watchlist</div>
  `;
  
  sorted.forEach(([code, c]) => {
    const score = getAvg(c.vals);
    const risk = getRisk(score);
    html += `
      <div class="watch-item" onclick="showDetails('${code}')" 
           onmouseenter="document.getElementById('dot-${code}').classList.add('highlight')"
           onmouseleave="document.getElementById('dot-${code}').classList.remove('highlight')">
        <span>${c.name}</span>
        <span style="color:${risk.color}; font-family:var(--mono)">${score}</span>
      </div>
    `;
  });
  
  document.getElementById('sidePanel').innerHTML = html;
}

function showDetails(code) {
  const c = DATA[code];
  const score = getAvg(c.vals);
  const risk = getRisk(score);
  
  let html = `
    <button class="back-btn" onclick="renderGlobal()">← BACK</button>
    <h2 style="text-transform:uppercase">${c.name}</h2>
    <p style="color:${risk.color}; font-family:var(--mono); margin-bottom:20px">${risk.label} RISK LEVEL</p>
    
    <div style="height:200px; margin-bottom:30px">
      <canvas id="radarChart"></canvas>
    </div>
    
    <div class="section-title">Breakdown</div>
  `;
  
  DIMENSIONS.forEach((dim, i) => {
    const val = c.vals[i];
    html += `
      <div class="risk-bar-container">
        <div class="risk-bar-label"><span>${dim}</span><span>${val}%</span></div>
        <div class="risk-bar-bg">
          <div class="risk-bar-fill" style="width:${val}%; background:${getRisk(val).color}"></div>
        </div>
      </div>
    `;
  });
  
  document.getElementById('sidePanel').innerHTML = html;
  
  // Render Chart
  const ctx = document.getElementById('radarChart').getContext('2d');
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DIMENSIONS,
      datasets: [{
        data: c.vals,
        borderColor: '#38bdf8',
        backgroundColor: 'rgba(56, 189, 248, 0.2)',
        borderWidth: 2,
        pointRadius: 0
      }]
    },
    options: {
      scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#283d63' }, pointLabels: { color: '#94a3b8', font: { family: 'Share Tech Mono' } } } },
      plugins: { legend: { display: false } }
    }
  });
}

window.onload = init;
</script>
</body>
</html>
