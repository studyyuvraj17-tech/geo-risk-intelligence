<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geo Risk Intelligence</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<section class="hero">
  <h1>Geo Risk Intelligence</h1>
  <p>Global Geopolitical Risk Dashboard</p>
</section>

<!-- WORLD MAP -->
<section class="map-section">

<svg viewBox="0 0 1000 500" class="world-map">

  <!-- USA -->
  <path d="M150,200 L250,200 L250,250 L150,250 Z"
        class="country" onclick="showCountry('USA')" />

  <!-- INDIA -->
  <path d="M650,300 L700,300 L700,350 L650,350 Z"
        class="country" onclick="showCountry('India')" />

  <!-- PAKISTAN -->
  <path d="M620,300 L650,300 L650,350 L620,350 Z"
        class="country" onclick="showCountry('Pakistan')" />

  <!-- CHINA -->
  <path d="M700,250 L800,250 L800,350 L700,350 Z"
        class="country" onclick="showCountry('China')" />

  <!-- RUSSIA -->
  <path d="M600,100 L850,100 L850,200 L600,200 Z"
        class="country" onclick="showCountry('Russia')" />

</svg>

</section>

<!-- SLIDING DASHBOARD -->
<div id="dashboard" class="panel">

  <h2 id="country-name"></h2>
  <p id="analysis"></p>

  <div class="score-box">
    <h3>Risk Score: <span id="score"></span></h3>
    <p id="risk-level"></p>
  </div>

  <canvas id="radarChart" width="300" height="300"></canvas>

  <div id="dimensions"></div>

</div>

<footer>
  <p>© 2026 Geo Risk Intelligence</p>
</footer>

</body>
</html>
