<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geo Risk Intelligence</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<section class="hero">
  <h1>Geo Risk Intelligence</h1>
  <p>Advanced Geopolitical Risk Analytics</p>
</section>

<section class="map-section">

<svg viewBox="0 0 1000 500" class="world-map">

  <path id="USA" class="country" d="M150,200 L250,200 L250,250 L150,250 Z"/>
  <path id="India" class="country" d="M650,300 L700,300 L700,350 L650,350 Z"/>
  <path id="Pakistan" class="country" d="M620,300 L650,300 L650,350 L620,350 Z"/>
  <path id="China" class="country" d="M700,250 L800,250 L800,350 L700,350 Z"/>
  <path id="Russia" class="country" d="M600,100 L850,100 L850,200 L600,200 Z"/>

</svg>

</section>

<!-- PANEL -->
<div id="dashboard" class="panel">

  <button class="close-btn" onclick="closePanel()">✖</button>

  <h2 id="country-name"></h2>
  <p id="analysis"></p>

  <!-- RISK METER -->
  <div class="meter">
    <div id="meter-fill"></div>
    <span id="meter-text"></span>
  </div>

  <h3>Final Risk Score: <span id="score"></span></h3>

  <div id="dimensions"></div>

</div>

</body>
</html>
