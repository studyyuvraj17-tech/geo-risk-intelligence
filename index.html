<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo Risk Intelligence</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #070b14;
      --surface:   #0d1424;
      --surface2:  #111d30;
      --border:    #1e3050;
      --accent:    #00d4ff;
      --accent2:   #0090cc;
      --low:       #22c55e;
      --medium:    #f59e0b;
      --high:      #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Exo 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,11,20,0.85);
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      border: 2px solid var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--accent);
      box-shadow: 0 0 12px rgba(0,212,255,0.3);
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      text-transform: uppercase;
    }

    .logo-text span {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.12em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .stat-chip {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      background: var(--surface);
    }

    .stat-chip b { color: var(--accent); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--low);
      letter-spacing: 0.1em;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--low);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    /* ── MAIN LAYOUT ── */
    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 60px;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      align-self: flex-end;
      padding-right: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    /* ── MAP ── */
    .map-wrapper {
      position: relative;
      width: 100%;
      max-width: 1100px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,212,255,0.05);
      background: var(--surface);
    }

    .map-wrapper img {
      width: 100%;
      display: block;
      filter: brightness(0.55) saturate(0.4) hue-rotate(180deg);
      user-select: none;
      pointer-events: none;
    }

    /* ── DOTS ── */
    .dot {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 20;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .dot:hover {
      transform: translate(-50%, -50%) scale(1.5);
      z-index: 30;
    }

    .dot.low    { background: var(--low);    box-shadow: 0 0 8px var(--low); }
    .dot.medium { background: var(--medium); box-shadow: 0 0 8px var(--medium); }
    .dot.high   { background: var(--high);   box-shadow: 0 0 8px var(--high); }

    .dot.high::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--high);
      animation: pulse 1.5s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* ── TOOLTIP ── */
    .tooltip {
      position: absolute;
      background: rgba(7,11,20,0.92);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text);
      white-space: nowrap;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%, -130%);
      display: none;
    }

    /* ── PANEL ── */
    .panel {
      position: fixed;
      right: -380px;
      top: 0;
      width: 360px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: right 0.38s cubic-bezier(0.4,0,0.2,1);
      z-index: 100;
      box-shadow: -10px 0 40px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .panel.open { right: 0; }

    /* Panel header stripe */
    .panel-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }

    .panel-top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .close-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .close-btn:hover { border-color: var(--high); color: var(--high); }

    .country-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .country-meta {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.1em;
    }

    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-top: 10px;
      border: 1px solid currentColor;
    }

    .risk-badge.low    { color: var(--low);    background: rgba(34,197,94,0.1); }
    .risk-badge.medium { color: var(--medium); background: rgba(245,158,11,0.1); }
    .risk-badge.high   { color: var(--high);   background: rgba(239,68,68,0.1); }

    .risk-badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .risk-score {
      margin-left: auto;
      font-size: 11px;
      opacity: 0.7;
    }

    /* Panel body — scrollable */
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Section label */
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* Chart */
    .chart-box {
      width: 100%;
      height: 230px;
      margin-bottom: 24px;
    }

    /* Breakdown bars */
    .breakdown { margin-bottom: 28px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .bar-label {
      width: 82px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .bar-value {
      width: 28px;
      text-align: right;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text);
      flex-shrink: 0;
    }

    /* Composite score */
    .composite {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 28px;
    }

    .composite-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .composite-value {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .composite-value small {
      font-size: 13px;
      color: var(--muted);
    }

    /* Footer note */
    .panel-footer {
      flex-shrink: 0;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      background: var(--surface2);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">GR</div>
    <div class="logo-text">
      <h1>Geo Risk Intelligence</h1>
      <span>GLOBAL THREAT ASSESSMENT PLATFORM</span>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-chip">Countries Monitored: <b id="countTotal">0</b></div>
    <div class="stat-chip">High Risk: <b id="countHigh" style="color:var(--high)">0</b></div>
    <div class="live-badge">
      <div class="live-dot"></div>
      STATIC DATA
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--low)"></div> Low Risk
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--medium)"></div> Medium Risk
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--high)"></div> High Risk
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrapper" id="mapWrapper">
    <img id="mapImg"
      src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
      alt="World Map" draggable="false"/>
    <div id="tooltip" class="tooltip"></div>
  </div>

</div>

<!-- SIDE PANEL -->
<div class="panel" id="panel">

  <div class="panel-header">
    <div class="panel-top-row">
      <div>
        <div class="country-name" id="panelCountry">—</div>
        <div class="country-meta" id="panelMeta">SELECT A COUNTRY</div>
      </div>
      <button class="close-btn" id="closeBtn" title="Close">✕</button>
    </div>
    <div class="risk-badge" id="riskBadge">—</div>
  </div>

  <div class="panel-body">

    <!-- COMPOSITE SCORE -->
    <div class="composite">
      <div class="composite-label">COMPOSITE RISK SCORE</div>
      <div class="composite-value" id="compositeScore">—<small>/100</small></div>
    </div>

    <!-- RADAR CHART -->
    <div class="section-label">Threat Radar</div>
    <div class="chart-box">
      <canvas id="radarChart"></canvas>
    </div>

    <!-- BREAKDOWN BARS -->
    <div class="section-label">Risk Breakdown</div>
    <div class="breakdown" id="breakdown"></div>

  </div>

  <div class="panel-footer">
    DATA SOURCE: STATIC DEMO — v1.0.0 &nbsp;|&nbsp; LAST UPDATED: 2025-Q2
  </div>

</div>


<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const LABELS = ["Political","Conflict","Sanctions","Unrest","Terrorism","Legal"];

const COUNTRIES = {
  Russia:    { lat: 61.5,  lon: 105.3,  values: [40,90,95,50,40,60] },
  India:     { lat: 20.6,  lon:  78.9,  values: [38,45,20,50,35,40] },
  USA:       { lat: 37.1,  lon: -95.7,  values: [45,60,25,65,30,40] },
  China:     { lat: 35.8,  lon: 104.1,  values: [30,65,50,50,40,50] },
  Pakistan:  { lat: 30.3,  lon:  69.3,  values: [65,70,60,65,60,70] },
  Ukraine:   { lat: 48.4,  lon:  31.2,  values: [80,95,70,75,55,65] },
  Brazil:    { lat: -14.2, lon: -51.9,  values: [55,50,10,60,55,50] },
  Iran:      { lat: 32.4,  lon:  53.7,  values: [60,65,90,70,50,75] },
  Nigeria:   { lat:  9.1,  lon:   8.7,  values: [70,75,15,70,65,68] },
  Germany:   { lat: 51.2,  lon:  10.4,  values: [20,15,10,25,15,15] },
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function avg(arr) {
  return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
}

function riskClass(score) {
  if (score < 34) return "low";
  if (score < 67) return "medium";
  return "high";
}

function riskLabel(score) {
  if (score < 34) return "LOW RISK";
  if (score < 67) return "MEDIUM RISK";
  return "HIGH RISK";
}

function barColor(val) {
  if (val < 34) return "var(--low)";
  if (val < 67) return "var(--medium)";
  return "var(--high)";
}

// ─── HEADER STATS ────────────────────────────────────────────────────────────
function updateHeaderStats() {
  const total = Object.keys(COUNTRIES).length;
  const high  = Object.values(COUNTRIES).filter(c => riskClass(avg(c.values)) === "high").length;
  document.getElementById("countTotal").textContent = total;
  document.getElementById("countHigh").textContent  = high;
}

// ─── MAP DOTS ────────────────────────────────────────────────────────────────
function latlonToXY(lat, lon, w, h) {
  const x = (lon + 180) * (w / 360);
  const y = (90 - lat) * (h / 180);
  return { x, y };
}

function createDots() {
  // Remove old dots
  document.querySelectorAll(".dot").forEach(d => d.remove());

  const wrapper = document.getElementById("mapWrapper");
  const img     = document.getElementById("mapImg");
  const tooltip = document.getElementById("tooltip");

  const w = img.clientWidth;
  const h = img.clientHeight;

  for (const [name, data] of Object.entries(COUNTRIES)) {
    const score = avg(data.values);
    const cls   = riskClass(score);
    const { x, y } = latlonToXY(data.lat, data.lon, w, h);

    const dot = document.createElement("div");
    dot.className = `dot ${cls}`;
    dot.style.left = x + "px";
    dot.style.top  = y + "px";

    // Tooltip
    dot.addEventListener("mouseenter", (e) => {
      tooltip.textContent = `${name}  ·  ${riskLabel(score)}`;
      tooltip.style.left  = x + "px";
      tooltip.style.top   = y + "px";
      tooltip.style.display = "block";
    });

    dot.addEventListener("mouseleave", () => {
      tooltip.style.display = "none";
    });

    dot.addEventListener("click", () => {
      tooltip.style.display = "none";
      openPanel(name);
    });

    wrapper.appendChild(dot);
  }
}

// Re-create dots on resize
window.addEventListener("resize", () => {
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(createDots, 150);
});

// ─── CHART INSTANCE ──────────────────────────────────────────────────────────
let radarChart = null;

// ─── OPEN PANEL ──────────────────────────────────────────────────────────────
function openPanel(name) {
  const data  = COUNTRIES[name];
  const score = avg(data.values);
  const cls   = riskClass(score);

  // Header
  document.getElementById("panelCountry").textContent = name;
  document.getElementById("panelMeta").textContent    = `RISK ASSESSMENT  ·  ${Object.keys(COUNTRIES).indexOf(name) + 1} OF ${Object.keys(COUNTRIES).length}`;

  const badge = document.getElementById("riskBadge");
  badge.className = `risk-badge ${cls}`;
  badge.innerHTML = `${riskLabel(score)} <span class="risk-score">SCORE: ${score}/100</span>`;

  // Composite
  const comp = document.getElementById("compositeScore");
  comp.style.color = cls === "low" ? "var(--low)" : cls === "medium" ? "var(--medium)" : "var(--high)";
  comp.innerHTML = `${score}<small>/100</small>`;

  // Radar
  if (radarChart) radarChart.destroy();
  radarChart = new Chart(document.getElementById("radarChart"), {
    type: "radar",
    data: {
      labels: LABELS,
      datasets: [{
        data: data.values,
        borderColor: "rgba(0,212,255,0.9)",
        backgroundColor: "rgba(0,212,255,0.08)",
        borderWidth: 2,
        pointBackgroundColor: "rgba(0,212,255,0.9)",
        pointBorderColor: "transparent",
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 500 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.raw}`
          }
        }
      },
      scales: {
        r: {
          min: 0,
          max: 100,
          ticks: {
            display: false,
            stepSize: 25,
          },
          grid:         { color: "rgba(30,48,80,0.8)" },
          angleLines:   { color: "rgba(30,48,80,0.8)" },
          pointLabels:  {
            color: "#64748b",
            font: { family: "'Share Tech Mono'", size: 10 }
          }
        }
      }
    }
  });

  // Breakdown bars
  let html = "";
  data.values.forEach((v, i) => {
    html += `
      <div class="bar-row">
        <div class="bar-label">${LABELS[i]}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${v}%; background:${barColor(v)}"></div>
        </div>
        <div class="bar-value">${v}</div>
      </div>`;
  });
  document.getElementById("breakdown").innerHTML = html;

  // Open
  document.getElementById("panel").classList.add("open");
}

// ─── CLOSE PANEL ─────────────────────────────────────────────────────────────
document.getElementById("closeBtn").addEventListener("click", () => {
  document.getElementById("panel").classList.remove("open");
});

// Close on outside click
document.addEventListener("click", (e) => {
  const panel = document.getElementById("panel");
  if (!panel.contains(e.target) && !e.target.classList.contains("dot")) {
    panel.classList.remove("open");
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateHeaderStats();

const mapImg = document.getElementById("mapImg");
if (mapImg.complete) {
  createDots();
} else {
  mapImg.addEventListener("load", createDots);
}
</script>
</body>
</html>
