<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo Risk Intelligence | Global Command</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #020408;
      --surface: #0a111f;
      --surface-light: #162235;
      --border: #1e3050;
      --accent: #00d4ff;
      --low: #22c55e;
      --medium: #f59e0b;
      --high: #ef4444;
      --critical: #ff1f1f;
      --text: #f8fafc;
      --muted: #94a3b8;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Exo 2', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* Grid Overlay */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }

    /* --- HEADER --- */
    header {
      z-index: 100; display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 2rem; background: rgba(2, 4, 8, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    }
    .logo-group { display: flex; align-items: center; gap: 12px; }
    .logo-box {
      width: 35px; height: 35px; border: 2px solid var(--accent);
      display: grid; place-items: center; color: var(--accent);
      font-family: var(--mono); font-weight: bold; border-radius: 4px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }
    .logo-text h1 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
    
    .header-stats { display: flex; gap: 1.5rem; }
    .stat-item { text-align: center; font-family: var(--mono); border-left: 1px solid var(--border); padding-left: 1.5rem; }
    .stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
    .stat-value { font-size: 0.9rem; font-weight: bold; color: var(--accent); }

    /* --- TOOLBAR --- */
    .toolbar {
      padding: 10px 2rem; background: rgba(10, 17, 31, 0.8); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; z-index: 90;
    }
    .search-container { position: relative; width: 300px; }
    #searchInput {
      width: 100%; background: var(--surface-light); border: 1px solid var(--border);
      color: white; padding: 8px 12px 8px 35px; border-radius: 4px; font-family: var(--mono); font-size: 0.8rem; outline: none; transition: 0.2s;
    }
    #searchInput:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    
    .filter-pills { display: flex; gap: 8px; }
    .pill {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 5px 14px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; font-family: var(--mono); transition: 0.2s;
    }
    .pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: bold; }

    /* --- MAIN LAYOUT --- */
    .app-container { flex: 1; display: flex; position: relative; overflow: hidden; }
    .map-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .map-container { position: relative; width: 100%; max-width: 1100px; }
    .map-container img { width: 100%; display: block; filter: brightness(0.4) saturate(0.6) hue-rotate(195deg); pointer-events: none; opacity: 0.8; }

    /* --- DOTS --- */
    .dot {
      position: absolute; width: 11px; height: 11px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .dot:hover { transform: translate(-50%, -50%) scale(2); z-index: 10; }
    .dot.selected { transform: translate(-50%, -50%) scale(2.5); border: 2px solid #fff; z-index: 11; box-shadow: 0 0 20px currentColor; }
    
    .dot-low { background: var(--low); color: var(--low); }
    .dot-medium { background: var(--medium); color: var(--medium); }
    .dot-high { background: var(--high); color: var(--high); }
    
    .dot-critical::after {
      content: ''; position: absolute; inset: -5px; border-radius: 50%; border: 1px solid var(--high); animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

    /* --- SIDE PANEL --- */
    .side-panel { width: 440px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 200; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
    .panel-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
    .panel-content::-webkit-scrollbar { width: 4px; }
    .panel-content::-webkit-scrollbar-thumb { background: var(--border); }

    /* Dashboard Modules */
    .section-title { font-family: var(--mono); font-size: 0.7rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 1.5rem 0 12px 0; letter-spacing: 1px; text-transform: uppercase; }
    
    .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
    .leaderboard-item:hover { color: var(--accent); padding-left: 5px; }
    .risk-score-badge { font-family: var(--mono); font-weight: bold; font-size: 0.8rem; }

    .news-card { border-left: 2px solid var(--high); padding: 10px 12px; background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 0 4px 4px 0; }
    .news-time { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); margin-bottom: 4px; }
    .news-text { font-size: 0.8rem; line-height: 1.4; color: #cbd5e1; }

    .score-hero { background: var(--surface-light); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .hero-val { font-family: var(--mono); font-size: 2.5rem; font-weight: bold; color: var(--accent); line-height: 1; }
    .hero-label { font-size: 0.65rem; color: var(--muted); font-family: var(--mono); text-transform: uppercase; }

    .chart-box { height: 250px; margin-bottom: 1.5rem; }
    
    .back-btn { background: transparent; border: none; color: var(--accent); font-family: var(--mono); font-size: 0.7rem; cursor: pointer; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
    .back-btn:hover { text-decoration: underline; }

    #mapTooltip { position: absolute; background: var(--surface-light); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 4px; pointer-events: none; font-family: var(--mono); font-size: 0.75rem; z-index: 1000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-box">GR</div>
    <div class="logo-text">
      <h1>Geo Risk Terminal</h1>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-item"><div class="stat-label">Coverage</div><div class="stat-value">195 Countries</div></div>
    <div class="stat-item"><div class="stat-label">Data Sources</div><div class="stat-value">340+ Active</div></div>
    <div class="stat-item"><div class="stat-label">Last Update</div><div class="stat-value">06:14 UTC</div></div>
  </div>
</header>

<div class="toolbar">
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search system database...">
  </div>
  <div class="filter-pills">
    <button class="pill active" data-filter="all">GLOBAL</button>
    <button class="pill" data-filter="high">CRITICAL</button>
    <button class="pill" data-filter="medium">TRANSITIONAL</button>
    <button class="pill" data-filter="low">STABLE</button>
  </div>
</div>

<div class="app-container">
  <main class="map-area">
    <div class="map-container" id="mapContainer">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" id="worldMap">
    </div>
    <div id="mapTooltip"></div>
  </main>

  <aside class="side-panel">
    <div class="panel-content" id="panelContent">
      </div>
  </aside>
</div>

<script>
// --- CONFIGURATION ---
const DIMENSIONS = ["Political", "Conflict", "Sanctions", "Unrest", "Terrorism", "Legal"];

const DATA = {
  "UA": { name: "Ukraine", lat: 48.4, lon: 31.2, vals: [85, 98, 70, 75, 60, 65], trend: "up" },
  "SY": { name: "Syria", lat: 34.8, lon: 38.9, vals: [92, 90, 85, 80, 85, 88], trend: "stable" },
  "AF": { name: "Afghanistan", lat: 33.9, lon: 67.7, vals: [90, 85, 80, 75, 95, 90], trend: "stable" },
  "RU": { name: "Russia", lat: 61.5, lon: 105.3, vals: [50, 95, 98, 45, 40, 70], trend: "up" },
  "US": { name: "United States", lat: 37.1, lon: -95.7, vals: [40, 30, 10, 55, 35, 25], trend: "up" },
  "IN": { name: "India", lat: 20.6, lon: 78.9, vals: [35, 40, 15, 50, 45, 40], trend: "stable" },
  "CN": { name: "China", lat: 35.8, lon: 104.1, vals: [30, 50, 60, 40, 30, 60], trend: "up" },
  "BR": { name: "Brazil", lat: -14.2, lon: -51.9, vals: [50, 40, 10, 65, 20, 55], trend: "stable" },
  "MX": { name: "Mexico", lat: 23.6, lon: -102.5, vals: [65, 75, 10, 60, 80, 70], trend: "up" },
  "GB": { name: "United Kingdom", lat: 55.4, lon: -3.4, vals: [25, 15, 10, 40, 35, 20], trend: "stable" },
  "ZA": { name: "South Africa", lat: -30.5, lon: 22.9, vals: [60, 35, 15, 80, 20, 55], trend: "up" },
  "IR": { name: "Iran", lat: 32.4, lon: 53.6, vals: [75, 65, 95, 70, 55, 80], trend: "up" },
  "KP": { name: "North Korea", lat: 40.3, lon: 127.5, vals: [85, 75, 99, 30, 20, 95], trend: "stable" },
  "IL": { name: "Israel", lat: 31.0, lon: 34.8, vals: [70, 95, 20, 65, 90, 45], trend: "up" }
};

const NEWS = [
  { time: "06:14 UTC", text: "Escalation in maritime corridor — Strait of Hormuz.", type: "high" },
  { time: "04:52 UTC", text: "New sanctions package targeting energy sector exports.", type: "high" },
  { time: "03:30 UTC", text: "Protest movement expands to 4 additional regions.", type: "med" }
];

// --- CORE LOGIC ---
let radarChart = null;
const MAP_BOUNDS = { top: 85, bottom: -60, left: -180, right: 180 };

function latLonToPercent(lat, lon) {
  return {
    x: ((lon - MAP_BOUNDS.left) / (MAP_BOUNDS.right - MAP_BOUNDS.left)) * 100,
    y: ((MAP_BOUNDS.top - lat) / (MAP_BOUNDS.top - MAP_BOUNDS.bottom)) * 100
  };
}

const calcAvg = (vals) => Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);

function init() {
  renderDots();
  renderGlobalOverview();
  
  document.getElementById('searchInput').addEventListener('input', handleFilter);
  document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', e => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    handleFilter();
  }));
}

function renderDots() {
  const container = document.getElementById('mapContainer');
  document.querySelectorAll('.dot').forEach(d => d.remove());

  Object.entries(DATA).forEach(([code, country]) => {
    const avg = calcAvg(country.vals);
    const dot = document.createElement('div');
    dot.className = `dot ${avg > 70 ? 'dot-high dot-critical' : (avg > 40 ? 'dot-medium' : 'dot-low')}`;
    dot.dataset.code = code;
    const pos = latLonToPercent(country.lat, country.lon);
    dot.style.left = `${pos.x}%`; dot.style.top = `${pos.y}%`;

    dot.addEventListener('mouseenter', (e) => showTooltip(e, country.name, avg));
    dot.addEventListener('mouseleave', hideTooltip);
    dot.addEventListener('click', () => selectCountry(code));
    container.appendChild(dot);
  });
}

function handleFilter() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.querySelector('.pill.active').dataset.filter;
  document.querySelectorAll('.dot').forEach(dot => {
    const country = DATA[dot.dataset.code];
    const score = calcAvg(country.vals);
    const riskLabel = score > 70 ? 'high' : (score > 40 ? 'medium' : 'low');
    const matchesSearch = country.name.toLowerCase().includes(query);
    const matchesPill = filter === 'all' || filter === riskLabel;
    dot.style.display = (matchesSearch && matchesPill) ? 'block' : 'none';
  });
}

function renderGlobalOverview() {
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('selected'));

  const criticalOnes = Object.entries(DATA)
    .map(([code, d]) => ({ code, name: d.name, score: calcAvg(d.vals) }))
    .sort((a,b) => b.score - a.score).slice(0, 6);

  document.getElementById('panelContent').innerHTML = `
    <h2 style="font-size:1.3rem; margin-bottom:1.5rem; letter-spacing:1px;">COMMAND CENTER</h2>
    
    <div class="score-hero">
      <div>
        <div class="hero-label">Global Risk Avg</div>
        <div class="hero-val">64</div>
      </div>
      <div style="text-align:right; font-family:var(--mono); color:var(--high); font-size:0.8rem">↑ +2.1%</div>
    </div>

    <div class="section-title">Critical Risk Leaderboard</div>
    ${criticalOnes.map((c, i) => `
      <div class="leaderboard-item" onclick="selectCountry('${c.code}')">
        <span style="font-size:0.85rem">${i+1}. ${c.name}</span>
        <span class="risk-score-badge" style="color:${c.score > 70 ? 'var(--high)' : 'var(--medium)'}">${c.score}</span>
      </div>
    `).join('')}

    <div class="section-title">Active Threat Intelligence</div>
    ${NEWS.map(n => `
      <div class="news-card" style="border-left-color: ${n.type === 'high' ? 'var(--high)' : 'var(--medium)'}">
        <div class="news-time">${n.time}</div>
        <div class="news-text">${n.text}</div>
      </div>
    `).join('')}
  `;
}

function selectCountry(code) {
  const country = DATA[code];
  const score = calcAvg(country.vals);

  document.querySelectorAll('.dot').forEach(d => d.classList.remove('selected'));
  document.querySelector(`[data-code="${code}"]`).classList.add('selected');

  document.getElementById('panelContent').innerHTML = `
    <button class="back-btn" onclick="renderGlobalOverview()">← BACK TO GLOBAL</button>
    
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:1rem">
      <img src="https://flagcdn.com/w80/${code.toLowerCase()}.png" style="width:35px; border-radius:2px">
      <h2 style="font-size:1.6rem; letter-spacing:1px;">${country.name}</h2>
    </div>

    <div class="score-hero">
      <div>
        <div class="hero-label">Composite Index</div>
        <div class="hero-val" style="color:${score > 70 ? 'var(--high)' : (score > 40 ? 'var(--medium)' : 'var(--low)')}">${score}</div>
      </div>
      <div style="text-align:right; font-family:var(--mono); font-size:0.8rem">${country.trend === 'up' ? '▲ RISING' : '● STABLE'}</div>
    </div>

    <div class="section-title">Threat Radar</div>
    <div class="chart-box"><canvas id="radarChart"></canvas></div>

    <div class="section-title">Metric Breakdown</div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      ${DIMENSIONS.map((dim, i) => `
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.75rem;">
          <span style="color:var(--muted); font-family:var(--mono);">${dim.toUpperCase()}</span>
          <span style="font-weight:bold">${country.vals[i]}</span>
        </div>
        <div style="height:4px; background:#0f172a; border-radius:2px;">
          <div style="height:100%; width:${country.vals[i]}%; background:${country.vals[i] > 70 ? 'var(--high)' : (country.vals[i] > 40 ? 'var(--medium)' : 'var(--low)')}; border-radius:2px;"></div>
        </div>
      `).join('')}
    </div>
  `;
  renderChart(country.vals);
}

function renderChart(vals) {
  const ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DIMENSIONS,
      datasets: [{
        data: vals,
        backgroundColor: 'rgba(0, 212, 255, 0.1)',
        borderColor: '#00d4ff',
        borderWidth: 2,
        pointBackgroundColor: '#00d4ff'
      }]
    },
    options: {
      scales: {
        r: {
          min: 0, max: 100, ticks: { display: false },
          grid: { color: '#1e3050' },
          angleLines: { color: '#1e3050' },
          pointLabels: { color: '#94a3b8', font: { family: 'Share Tech Mono', size: 9 } }
        }
      },
      plugins: { legend: { display: false } },
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

function showTooltip(e, name, score) {
  const t = document.getElementById('mapTooltip');
  t.innerHTML = `${name.toUpperCase()} : ${score}`;
  t.style.display = 'block'; t.style.left = (e.pageX + 15) + 'px'; t.style.top = (e.pageY - 15) + 'px';
}
function hideTooltip() { document.getElementById('mapTooltip').style.display = 'none'; }

window.onload = init;
</script>
</body>
</html>
